<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#01696f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zipline ME" />
  <title>Zipline ME — mapa kolejek tyrolskich w Czarnogórze</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='10' fill='%2301696f'/><path d='M8 15L39 10' stroke='white' stroke-width='2.5' stroke-linecap='round'/><circle cx='25' cy='12.5' r='3.5' fill='%23ef4444' stroke='white' stroke-width='1.5'/><path d='M6 36L18 18l6 9 5-6 13 15H6Z' fill='white' opacity='.92'/></svg>" />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root, [data-theme="light"] {
      --font-body: 'General Sans', Inter, system-ui, sans-serif;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --space-2: .5rem; --space-3: .75rem; --space-4: 1rem; --space-5: 1.25rem;
      --radius-md: .5rem; --radius-lg: .75rem;
      --color-bg:#f7f6f2; --color-surface:#f9f8f5; --color-surface-2:#fbfbf9;
      --color-text:#28251d; --color-text-muted:#66645f; --color-text-faint:#9f9d97;
      --color-primary:#01696f; --color-primary-highlight:#cedcd8;
      --color-danger:#b91c1c;
      --shadow-sm:0 1px 2px rgba(0,0,0,.06); --shadow-md:0 10px 30px rgba(0,0,0,.10);
    }
    [data-theme="dark"] {
      --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d;
      --color-text:#ece9e1; --color-text-muted:#b8b3a7; --color-text-faint:#7e7a72;
      --color-primary:#4f98a3; --color-primary-highlight:#313b3b;
      --color-danger:#ef4444;
      --shadow-sm:0 1px 2px rgba(0,0,0,.2); --shadow-md:0 10px 30px rgba(0,0,0,.3);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d;
        --color-text:#ece9e1; --color-text-muted:#b8b3a7; --color-text-faint:#7e7a72;
        --color-primary:#4f98a3; --color-primary-highlight:#313b3b;
        --color-danger:#ef4444;
      }
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:var(--font-body);font-size:var(--text-base);line-height:1.5;color:var(--color-text);background:var(--color-bg)}
    button{font:inherit;cursor:pointer}
    .app{display:grid;grid-template-rows:auto 1fr auto;height:100dvh}
    .topbar{display:flex;align-items:center;gap:var(--space-3);padding:calc(var(--space-3) + env(safe-area-inset-top)) var(--space-4) var(--space-3);background:color-mix(in srgb, var(--color-surface) 92%, transparent);backdrop-filter:blur(10px);border-bottom:1px solid color-mix(in srgb, var(--color-text) 12%, transparent);position:relative;z-index:1000}
    .logo{width:36px;height:36px;border-radius:12px;background:var(--color-primary);display:grid;place-items:center;color:#f9f8f4;box-shadow:var(--shadow-sm);flex:none}
    .logo svg{width:24px;height:24px}
    .titles{min-width:0}
    .titles h1{font-size:var(--text-lg);line-height:1.1;margin:0;font-weight:700}
    .titles p{margin:2px 0 0;color:var(--color-text-muted);font-size:var(--text-xs)}
    .theme-btn{margin-left:auto;width:44px;height:44px;border-radius:14px;border:1px solid color-mix(in srgb, var(--color-text) 12%, transparent);background:var(--color-surface-2);color:var(--color-text);display:grid;place-items:center}
    #map{width:100%;height:100%;background:var(--color-surface-2)}
    .sheet{position:relative;z-index:1000;background:var(--color-surface);border-top:1px solid color-mix(in srgb, var(--color-text) 10%, transparent);padding:var(--space-4) var(--space-4) calc(var(--space-5) + env(safe-area-inset-bottom));display:grid;gap:var(--space-4);box-shadow:var(--shadow-md)}
    .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-2)}
    .btn{min-height:46px;border-radius:14px;border:1px solid color-mix(in srgb, var(--color-text) 10%, transparent);background:var(--color-surface-2);color:var(--color-text);font-size:var(--text-sm);font-weight:600;padding:0 var(--space-2);white-space:nowrap}
    .btn.primary{background:var(--color-primary);border-color:transparent;color:#f9f8f4}
    .btn.warn{background:color-mix(in srgb, var(--color-danger) 12%, var(--color-surface-2));color:var(--color-danger)}
    .meta{display:grid;gap:var(--space-2)}
    .status{font-size:var(--text-sm);color:var(--color-text-muted)}
    .hint{font-size:var(--text-xs);color:var(--color-text-faint)}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;background:var(--color-primary-highlight);color:var(--color-primary);font-size:var(--text-xs);font-weight:700}
    .leaflet-popup-content-wrapper{border-radius:14px}
    .leaflet-control-attribution{font-size:10px}
    .swipe{width:36px;height:4px;border-radius:99px;background:color-mix(in srgb, var(--color-text) 16%, transparent);margin:0 auto}
    @media (min-width: 820px){
      .app{grid-template-columns:380px 1fr;grid-template-rows:auto 1fr}
      .topbar{grid-column:1/2;border-right:1px solid color-mix(in srgb, var(--color-text) 10%, transparent)}
      .sheet{grid-column:1/2;grid-row:2/3;border-top:0;border-right:1px solid color-mix(in srgb, var(--color-text) 10%, transparent)}
      #map{grid-column:2/3;grid-row:1/3}
      .actions{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo" aria-label="Zipline ME logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 15L39 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="25" cy="12.5" r="3.5" fill="#ef4444" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 36L18 18l6 9 5-6 13 15H6Z" fill="currentColor" opacity=".92"/>
        </svg>
      </div>
      <div class="titles">
        <h1>Zipline ME</h1>
        <p>Mapa kolejek tyrolskich w Czarnogórze</p>
      </div>
      <button class="theme-btn" id="themeToggle" aria-label="Przełącz motyw" type="button"></button>
    </header>

    <main id="main">
      <div id="map" role="application" aria-label="Mapa Czarnogóry z punktami zipline"></div>
    </main>

    <section class="sheet" aria-label="Sterowanie aplikacją">
      <div class="swipe" aria-hidden="true"></div>
      <div class="meta">
        <div class="badge">Czarnogóra · ZIPLINE</div>
        <div class="status" id="status">Status: aplikacja gotowa.</div>
        <div class="hint">Do działania GPS potrzebny jest HTTPS i zgoda na lokalizację.</div>
      </div>
      <div class="actions">
        <button class="btn primary" id="locateBtn" type="button">Moja pozycja</button>
        <button class="btn" id="followBtn" type="button">Śledź</button>
        <button class="btn warn" id="stopBtn" type="button">Stop</button>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script>
    (function() {
      'use strict';

      var ziplines = [
        { name: 'Zipline na jeziorze Piva', place: 'Plužine', lat: 43.1548, lon: 18.8396 },
        { name: 'Zipline Tara 1050 m', place: 'Đurđevića Tara / NP Durmitor', lat: 43.1507, lon: 19.2919 },
        { name: 'Zipline Tara 824 m', place: 'Đurđevića Tara / NP Durmitor', lat: 43.1502, lon: 19.2932 },
        { name: 'Zipline Njeguši', place: 'Njeguši / Lovćen National Park', lat: 42.4308, lon: 18.8165 },
        { name: 'Zipline Brajići', place: 'Brajići / Budva', lat: 42.3176, lon: 18.9187 }
      ];

      var statusEl = document.getElementById('status');
      function updateStatus(text) { statusEl.textContent = 'Status: ' + text; }

      if (typeof L === 'undefined') {
        updateStatus('nie udało się załadować biblioteki mapy. Sprawdź połączenie z internetem.');
        return;
      }

      var map = L.map('map', { zoomControl: true }).setView([42.75, 19.2], 8);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      var zipIcon = L.divIcon({
        className: '',
        html: '<div style="width:16px;height:16px;border-radius:50%;background:#ef4444;border:2px solid #fff;box-shadow:0 0 0 4px rgba(239,68,68,.20)"></div>',
        iconSize: [16, 16], iconAnchor: [8, 8]
      });

      var myIcon = L.divIcon({
        className: '',
        html: '<div style="width:16px;height:16px;border-radius:50%;background:#2563eb;border:2px solid #fff;box-shadow:0 0 0 4px rgba(37,99,235,.20)"></div>',
        iconSize: [16, 16], iconAnchor: [8, 8]
      });

      var bounds = [];
      ziplines.forEach(function(item) {
        var marker = L.marker([item.lat, item.lon], { icon: zipIcon }).addTo(map);
        var osmUrl = 'https://www.openstreetmap.org/?mlat=' + item.lat + '&mlon=' + item.lon + '#map=17/' + item.lat + '/' + item.lon;
        marker.bindPopup(
          '<strong>' + item.name + '</strong><br>' + item.place +
          '<br><br><a target="_blank" rel="noopener noreferrer" href="' + osmUrl + '">Pokaż w OSM</a>'
        );
        bounds.push([item.lat, item.lon]);
      });
      map.fitBounds(bounds, { padding: [36, 36] });

      var myMarker = null;
      var accuracyCircle = null;
      var watchId = null;

      function renderPosition(position, center) {
        var lat = position.coords.latitude;
        var lon = position.coords.longitude;
        var accuracy = position.coords.accuracy || 0;
        if (!myMarker) {
          myMarker = L.marker([lat, lon], { icon: myIcon }).addTo(map).bindPopup('Twoja pozycja');
        } else {
          myMarker.setLatLng([lat, lon]);
        }
        if (!accuracyCircle) {
          accuracyCircle = L.circle([lat, lon], { radius: accuracy, color: '#2563eb', weight: 1, fillColor: '#60a5fa', fillOpacity: .16 }).addTo(map);
        } else {
          accuracyCircle.setLatLng([lat, lon]);
          accuracyCircle.setRadius(accuracy);
        }
        if (center) map.setView([lat, lon], Math.max(map.getZoom(), 12));
        updateStatus('lokalizacja OK, dokładność około ' + Math.round(accuracy) + ' m.');
      }

      function handleError(error) {
        var messages = { 1: 'brak zgody na lokalizację.', 2: 'nie udało się ustalić pozycji.', 3: 'przekroczono czas oczekiwania na GPS.' };
        updateStatus(messages[error.code] || 'błąd geolokalizacji.');
      }

      document.getElementById('locateBtn').addEventListener('click', function() {
        if (!navigator.geolocation) { updateStatus('przeglądarka nie obsługuje geolokalizacji.'); return; }
        updateStatus('pobieranie bieżącej pozycji...');
        navigator.geolocation.getCurrentPosition(
          function(pos) { renderPosition(pos, true); },
          handleError,
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
        );
      });

      document.getElementById('followBtn').addEventListener('click', function() {
        if (!navigator.geolocation) { updateStatus('przeglądarka nie obsługuje geolokalizacji.'); return; }
        if (watchId !== null) { updateStatus('śledzenie już działa.'); return; }
        updateStatus('uruchamianie śledzenia...');
        watchId = navigator.geolocation.watchPosition(
          function(pos) { renderPosition(pos, true); },
          handleError,
          { enableHighAccuracy: true, timeout: 20000, maximumAge: 3000 }
        );
      });

      document.getElementById('stopBtn').addEventListener('click', function() {
        if (watchId !== null) {
          navigator.geolocation.clearWatch(watchId);
          watchId = null;
          updateStatus('śledzenie zatrzymane.');
        } else {
          updateStatus('śledzenie nie było aktywne.');
        }
      });

      // Motyw jasny/ciemny
      var themeBtn = document.getElementById('themeToggle');
      var root = document.documentElement;
      var current = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', current);
      function renderTheme() {
        themeBtn.setAttribute('aria-label', 'Przełącz na ' + (current === 'dark' ? 'jasny' : 'ciemny') + ' motyw');
        themeBtn.innerHTML = current === 'dark'
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      }
      renderTheme();
      themeBtn.addEventListener('click', function() {
        current = current === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', current);
        renderTheme();
      });
    })();
  </script>
</body>
</html>
